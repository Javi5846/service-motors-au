<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background -->
  <rect width="200" height="200" rx="20" fill="#0A0A0A"/>

  <!-- Red top accent bar -->
  <rect x="0" y="0" width="200" height="6" rx="0" fill="#DC2626"/>
  <rect x="0" y="0" width="200" height="6" rx="20" fill="#DC2626"/>

  <!-- Hexagon shape (wrench/gear feel) -->
  <polygon points="100,30 130,47 130,81 100,98 70,81 70,47" fill="none" stroke="#DC2626" stroke-width="3"/>

  <!-- "SM" monogram inside hexagon -->
  <text x="100" y="78" font-family="Arial Black, sans-serif" font-size="28" font-weight="900" fill="white" text-anchor="middle" letter-spacing="-1">SM</text>

  <!-- Horizontal divider -->
  <rect x="20" y="112" width="160" height="2" fill="#DC2626"/>

  <!-- SERVICE MOTORS -->
  <text x="100" y="140" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="white" text-anchor="middle" letter-spacing="4">SERVICE MOTORS</text>

  <!-- AU -->
  <text x="100" y="168" font-family="Arial Black, sans-serif" font-size="22" font-weight="900" fill="#DC2626" text-anchor="middle" letter-spacing="6">AU</text>
</svg>
